# ============================================================
# Nginx 负载均衡配置 - IP 哈希 (IP Hash) 算法
# ============================================================
#
# 算法说明：
#   IP 哈希算法根据客户端 IP 地址的哈希值将请求分配给固定的
#   后端服务器。同一客户端 IP 的请求总是被发送到同一台服务器。
#   这实现了会话保持（Session Stickiness），无需在应用层处理
#   会话共享问题。
#
# 特点：
#   - 同一客户端 IP 始终访问同一台后端服务器
#   - 天然实现会话保持（Session Persistence）
#   - 适合需要保持用户会话状态的应用
#   - 负载分配可能不均衡（某些 IP 段可能集中到同一台服务器）
#   - 当后端服务器增减时，会影响大量会话的映射关系

upstream tomcat_cluster {
    # IP 哈希 (ip_hash) 算法
    ip_hash;

    server 172.28.0.11:8081 weight=1 max_fails=3 fail_timeout=30s;
    server 172.28.0.12:8082 weight=1 max_fails=3 fail_timeout=30s;
    server 172.28.0.13:8083 weight=1 max_fails=3 fail_timeout=30s;
}
