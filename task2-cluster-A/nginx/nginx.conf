# ============================================================
# Nginx 主配置文件 - Tomcat 集群负载均衡
# 默认使用加权轮询 (weighted round-robin) 算法
# 可通过 switch-algorithm.sh 脚本切换算法
# ============================================================

user  nginx;
worker_processes  auto;

error_log  /var/log/nginx/error.log warn;
pid        /var/run/nginx.pid;

events {
    worker_connections  1024;
    multi_accept on;
    use epoll;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # ==================== 日志格式 ====================
    log_format main '$remote_addr - $remote_user [$time_local] '
                    '"$request" $status $body_bytes_sent '
                    '"$http_referer" "$http_user_agent" '
                    'upstream_addr="$upstream_addr" '
                    'upstream_status="$upstream_status" '
                    'upstream_response_time="$upstream_response_time" '
                    'request_time="$request_time"';

    # 负载均衡分析专用日志格式（包含上游服务器信息）
    log_format loadbalance '$time_iso8601 | $remote_addr | '
                           '$upstream_addr | $upstream_status | '
                           '$request | $status | $body_bytes_sent | '
                           '$request_time';

    access_log  /var/log/nginx/access.log main;
    access_log  /var/log/nginx/loadbalance.log loadbalance;

    sendfile        on;
    tcp_nopush      on;
    tcp_nodelay     on;
    keepalive_timeout  65;
    types_hash_max_size 2048;

    # 压缩设置
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css text/xml application/json application/javascript;

    # ==================== 上游 Tomcat 集群 ====================
    # 【当前算法: 加权轮询 (weighted round-robin)】
    # 使用 switch-algorithm.sh 脚本切换为 least_conn 或 ip_hash
    upstream tomcat_cluster {
        # 加权轮询 (weighted round-robin) - 默认算法
        # 权重越高，分配的请求越多
        server 172.28.0.11:8081 weight=1;
        server 172.28.0.12:8082 weight=1;
        server 172.28.0.13:8083 weight=1;

        # 最大失败次数与超时
        server 172.28.0.11:8081 max_fails=3 fail_timeout=30s;
        server 172.28.0.12:8082 max_fails=3 fail_timeout=30s;
        server 172.28.0.13:8083 max_fails=3 fail_timeout=30s;
    }

    # ==================== 服务器配置 ====================
    server {
        listen       80;
        server_name  localhost;

        # 字符集
        charset utf-8;

        # ==================== 负载均衡代理 ====================
        location / {
            proxy_pass http://tomcat_cluster;

            # 代理头设置
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # 超时设置
            proxy_connect_timeout 10;
            proxy_send_timeout 30;
            proxy_read_timeout 30;

            # 缓冲设置
            proxy_buffering on;
            proxy_buffer_size 4k;
            proxy_buffers 8 4k;
            proxy_busy_buffers_size 8k;

            # 开启保持连接以提升性能
            proxy_http_version 1.1;
            proxy_set_header Connection "";

            # 添加响应头以标识处理请求的 Tomcat 服务器
            add_header X-Upstream-Server $upstream_addr;
            add_header X-Upstream-Status $upstream_status;
            add_header X-Cache-Status $upstream_cache_status;
        }

        # ==================== 静态资源缓存 ====================
        location ~* \.(jpg|jpeg|png|gif|ico|css|js|svg|woff|woff2|ttf|eot)$ {
            proxy_pass http://tomcat_cluster;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            expires 7d;
            add_header Cache-Control "public, immutable";
        }

        # ==================== 状态监控页面 ====================
        location /nginx_status {
            stub_status on;
            access_log off;
            allow 127.0.0.1;
            allow 172.28.0.0/16;
            deny all;
        }

        # ==================== 健康检查端点 ====================
        location /health {
            access_log off;
            return 200 "nginx is healthy\n";
            add_header Content-Type text/plain;
        }

        # ==================== 错误页面 ====================
        error_page 500 502 503 504 /50x.html;
        location = /50x.html {
            root /usr/share/nginx/html;
        }
    }
}
