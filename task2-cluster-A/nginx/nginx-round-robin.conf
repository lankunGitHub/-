# ============================================================
# Nginx 负载均衡配置 - 轮询 (Round Robin) 算法
# ============================================================
#
# 算法说明：
#   轮询是 Nginx 的默认负载均衡算法。请求按照顺序依次分配给
#   每个后端服务器。当所有服务器都具有相同权重时，请求会均匀分布。
#   加权轮询允许为不同性能的服务器设置不同权重。
#
# 特点：
#   - 请求均匀分布（权重相同时）
#   - 简单、无状态
#   - 不考虑服务器当前负载情况
#   - 适合所有服务器配置相同且请求处理时间相近的场景

upstream tomcat_cluster {
    # 轮询 (round-robin) 算法 - Nginx 默认算法
    # 不需要显式指定，不加任何指令即为轮询

    server 172.28.0.11:8081 weight=1 max_fails=3 fail_timeout=30s;
    server 172.28.0.12:8082 weight=1 max_fails=3 fail_timeout=30s;
    server 172.28.0.13:8083 weight=1 max_fails=3 fail_timeout=30s;
}
