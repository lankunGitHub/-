worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 1024;
    use epoll;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    log_format lb_format '$time_iso8601 | $remote_addr | $upstream_addr | '
                         '$upstream_status | $request | $status | '
                         '$body_bytes_sent | $request_time';
    access_log /var/log/nginx/loadbalance.log lb_format;
    access_log /var/log/nginx/access.log combined;

    sendfile on;
    tcp_nopush on;
    keepalive_timeout 65;

    upstream tomcat_cluster {
        least_conn;
        server 172.28.0.11:8081 weight=1 max_fails=3 fail_timeout=30s;
        server 172.28.0.12:8082 weight=1 max_fails=3 fail_timeout=30s;
        server 172.28.0.13:8083 weight=1 max_fails=3 fail_timeout=30s;
    }

    server {
        listen 80;
        server_name localhost;
        charset utf-8;
        location / {
            proxy_pass http://tomcat_cluster;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            add_header X-Upstream-Server $upstream_addr always;
            proxy_connect_timeout 5s;
            proxy_send_timeout 10s;
            proxy_read_timeout 10s;
        }
        location /health {
            access_log off;
            return 200 "OK\n";
            add_header Content-Type text/plain;
        }
    }
}
