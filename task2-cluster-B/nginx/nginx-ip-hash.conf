# ============================================================
# Version B: IP哈希 + 备用服务器 (IP Hash with Backup)
# ============================================================
# 特点: 除IP哈希外，配置 tomcat3 为 backup，仅在 tomcat1/2 全部故障时启用
#       演示生产环境中的故障转移机制

upstream tomcat_cluster {
    ip_hash;

    server 172.29.0.11:8081 weight=3 max_fails=3 fail_timeout=15s;
    server 172.29.0.12:8082 weight=2 max_fails=3 fail_timeout=15s;
    server 172.29.0.13:8083 weight=1 max_fails=3 fail_timeout=15s backup;
}
